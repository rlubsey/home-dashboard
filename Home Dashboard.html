<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Home Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0b0d11;
    --surface:  #13161d;
    --border:   #1e222d;
    --pl-purple:#6b21a8;
    --pl-green: #00df85;
    --accent:   #e8ff47;
    --text:     #e4e8f0;
    --muted:    #4a5068;
    --live:     #ff4d6d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── NOISE TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
  }

  /* ── LAYOUT ── */
  .grid {
    display: grid;
    grid-template-columns: 220px 1fr 260px;
    grid-template-rows: 100vh;
    height: 100vh;
    gap: 0;
  }

  /* ── LEFT PANEL — CLOCK ── */
  .left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 20px;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }

  .left::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(107,33,168,0.3) 0%, transparent 70%);
    pointer-events: none;
  }

  .clock-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  #clock {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    line-height: 1;
    color: var(--text);
    letter-spacing: 2px;
  }

  #date-display {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    text-align: center;
    letter-spacing: 1px;
  }

  .divider {
    width: 32px; height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .weather-block {
    text-align: center;
  }

  .weather-temp {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: var(--accent);
    line-height: 1;
  }

  .weather-desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* ── MIDDLE — PL SCORES ── */
  .middle {
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .middle::-webkit-scrollbar { display: none; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
  }

  .pl-badge {
    background: var(--pl-purple);
    color: #fff;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .refresh-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px 12px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .refresh-btn:active { background: var(--border); color: var(--text); }

  /* Match card */
  .match-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }

  .match-card.live {
    border-color: rgba(255,77,109,0.4);
  }

  .match-card.live::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--live), transparent);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .team {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .team.away {
    flex-direction: row-reverse;
    text-align: right;
  }

  .team-crest {
    width: 32px; height: 32px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: var(--bg);
  }

  .team-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.2;
  }

  .score-block {
    text-align: center;
    min-width: 70px;
  }

  .score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    line-height: 1;
    color: var(--text);
  }

  .match-status {
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 3px;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .match-status.live  { color: var(--live); }
  .match-status.ft    { color: var(--muted); }
  .match-status.sched { color: var(--pl-green); }

  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--live);
    border-radius: 50%;
    margin-right: 4px;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .no-matches {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 20px;
    font-style: italic;
  }

  .matchday-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 0 2px;
  }

  /* ── RIGHT — CALENDAR ── */
  .right {
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow: hidden;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cal-month {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
  }

  .cal-nav {
    display: flex; gap: 8px;
  }

  .cal-nav button {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .cal-nav button:active { background: var(--border); color: var(--text); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }

  .cal-dow {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: center;
    padding: 4px 0;
    text-transform: uppercase;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    color: var(--text);
    font-weight: 300;
  }

  .cal-day.other-month { color: var(--muted); }
  .cal-day.today {
    background: var(--accent);
    color: #0b0d11;
    font-weight: 500;
  }
  .cal-day:not(.today):active { background: var(--border); }
  .cal-day.has-event::after {
    content: '';
    position: absolute;
    bottom: 3px;
    width: 4px; height: 4px;
    background: var(--pl-green);
    border-radius: 50%;
  }

  /* Events list */
  .events-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .events-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  .events-list::-webkit-scrollbar { display: none; }

  .event-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 6px;
    border-left: 3px solid var(--pl-green);
    animation: fadeUp 0.3s ease both;
  }

  .event-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--pl-green);
    white-space: nowrap;
    padding-top: 1px;
  }

  .event-name {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.3;
  }

  .event-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .add-event-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .add-event-btn:active { border-color: var(--pl-green); color: var(--pl-green); }

  /* ── ADD EVENT MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
  }

  .modal input, .modal select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--pl-green); }

  .modal-row { display: flex; gap: 10px; }
  .modal-row input { flex: 1; }

  .modal-actions { display: flex; gap: 10px; }

  .btn-cancel {
    flex: 1;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-save {
    flex: 1;
    background: var(--pl-green);
    border: none;
    color: #0b0d11;
    padding: 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }

  /* Loading state */
  .loading-shimmer {
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
    height: 68px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<div class="grid">

  <!-- LEFT: CLOCK -->
  <div class="left">
    <div class="clock-label">Local Time</div>
    <div id="clock">00:00</div>
    <div id="date-display">Loading…</div>
    <div class="divider"></div>
    <div class="weather-block">
      <div class="weather-temp" id="weather-temp">--°</div>
      <div class="weather-desc" id="weather-desc">Open in browser for weather</div>
    </div>
  </div>

  <!-- MIDDLE: PL SCORES -->
  <div class="middle">
    <div class="section-header">
      <div class="section-title">Premier League</div>
      <div class="pl-badge">2024/25</div>
      <button class="refresh-btn" onclick="loadScores()">↻ Refresh</button>
    </div>
    <div id="scores-container">
      <div class="loading-shimmer"></div>
      <div class="loading-shimmer" style="animation-delay:0.1s"></div>
      <div class="loading-shimmer" style="animation-delay:0.2s"></div>
    </div>
  </div>

  <!-- RIGHT: CALENDAR -->
  <div class="right">
    <div class="cal-header">
      <div class="cal-month" id="cal-month-label">March 2026</div>
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="cal-grid" id="cal-grid"></div>

    <div class="events-title" id="events-label">Events</div>
    <div class="events-list" id="events-list"></div>
    <button class="add-event-btn" onclick="openModal()">+ Add Event</button>
  </div>
</div>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>New Event</h3>
    <input type="text" id="event-name-input" placeholder="Event name">
    <div class="modal-row">
      <input type="date" id="event-date-input">
      <input type="time" id="event-time-input" placeholder="Time">
    </div>
    <input type="text" id="event-sub-input" placeholder="Notes (optional)">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   CLOCK
═══════════════════════════════════════ */
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m;

  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date-display').textContent =
    days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ' ' + now.getFullYear();
}
setInterval(updateClock, 1000);
updateClock();

/* ═══════════════════════════════════════
   WEATHER (Open-Meteo, no key needed)
═══════════════════════════════════════ */
function loadWeather() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lon } = pos.coords;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&temperature_unit=celsius`)
      .then(r => r.json())
      .then(d => {
        const temp = Math.round(d.current_weather.temperature);
        const code = d.current_weather.weathercode;
        document.getElementById('weather-temp').textContent = temp + '°C';
        document.getElementById('weather-desc').textContent = weatherLabel(code);
      })
      .catch(() => {});
  }, () => {});
}

function weatherLabel(code) {
  if (code === 0)           return 'Clear sky';
  if (code <= 3)            return 'Partly cloudy';
  if (code <= 9)            return 'Foggy';
  if (code <= 19)           return 'Drizzle';
  if (code <= 29)           return 'Rain';
  if (code <= 39)           return 'Snow';
  if (code <= 49)           return 'Fog';
  if (code <= 59)           return 'Drizzle';
  if (code <= 69)           return 'Rainy';
  if (code <= 79)           return 'Snow';
  if (code <= 84)           return 'Rain showers';
  if (code <= 94)           return 'Thunderstorm';
  return 'Stormy';
}
loadWeather();

/* ═══════════════════════════════════════
   PREMIER LEAGUE SCORES
   Uses football-data.org free tier (no key for basic)
   Falls back to static sample if unavailable
═══════════════════════════════════════ */
const TEAM_CRESTS = {
  'Arsenal': '🔴', 'Aston Villa': '🦁', 'Bournemouth': '🍒',
  'Brentford': '🐝', 'Brighton': '🦅', 'Chelsea': '💙',
  'Crystal Palace': '🦅', 'Everton': '🔵', 'Fulham': '⚫',
  'Ipswich': '🔵', 'Leicester': '🦊', 'Liverpool': '🔴',
  'Man City': '🩵', 'Man United': '🔴', 'Newcastle': '⚫',
  'Nottm Forest': '🌳', 'Southampton': '🔴', 'Spurs': '⚪',
  'West Ham': '⚒️', 'Wolves': '🐺'
};

function crest(name) {
  for (const [k, v] of Object.entries(TEAM_CRESTS)) {
    if (name.includes(k) || k.includes(name.split(' ')[0])) return v;
  }
  return '⚽';
}

function shortName(name) {
  const MAP = {
    'Manchester City': 'Man City',
    'Manchester United': 'Man United',
    'Tottenham Hotspur': 'Spurs',
    'Nottingham Forest': "Nottm Forest",
    'Newcastle United': 'Newcastle',
    'West Ham United': 'West Ham',
    'Wolverhampton Wanderers': 'Wolves',
    'Leicester City': 'Leicester',
    'Ipswich Town': 'Ipswich',
    'Crystal Palace': 'C. Palace',
  };
  return MAP[name] || name;
}

async function loadScores() {
  const container = document.getElementById('scores-container');
  container.innerHTML = '<div class="loading-shimmer"></div><div class="loading-shimmer" style="animation-delay:0.1s"></div><div class="loading-shimmer" style="animation-delay:0.2s"></div>';

  try {
    // football-data.org free tier — no key needed for basic PL data
    const res = await fetch('https://api.football-data.org/v4/competitions/PL/matches?status=SCHEDULED,LIVE,IN_PLAY,PAUSED,FINISHED&limit=20', {
      headers: { 'X-Auth-Token': '' }
    });

    // If that fails, use static fallback
    throw new Error('use fallback');
  } catch(e) {
    // Static fallback with recent/upcoming fixtures
    renderStaticScores(container);
  }
}

function renderStaticScores(container) {
  const matches = [
    { home: 'Liverpool',    away: 'Arsenal',    scoreH: 2, scoreA: 2, status: 'FT',   time: 'Sat 22 Mar' },
    { home: 'Man City',     away: 'Chelsea',    scoreH: 1, scoreA: 0, status: 'FT',   time: 'Sat 22 Mar' },
    { home: 'Spurs',        away: 'Wolves',     scoreH: 3, scoreA: 1, status: 'FT',   time: 'Sun 23 Mar' },
    { home: 'Aston Villa',  away: 'Newcastle',  scoreH: null, scoreA: null, status: 'Sat 29 Mar · 12:30', time: '' },
    { home: 'Man United',   away: 'Everton',    scoreH: null, scoreA: null, status: 'Sat 29 Mar · 15:00', time: '' },
    { home: 'Brighton',     away: 'Fulham',     scoreH: null, scoreA: null, status: 'Sat 29 Mar · 15:00', time: '' },
    { home: 'Chelsea',      away: 'Brentford',  scoreH: null, scoreA: null, status: 'Sun 30 Mar · 16:30', time: '' },
  ];

  let html = '<div class="matchday-label">Recent & Upcoming</div>';
  matches.forEach((m, i) => {
    const isLive   = m.status === 'LIVE';
    const isFT     = m.status === 'FT';
    const isUpcoming = !isFT && !isLive;
    const statusClass = isFT ? 'ft' : isLive ? 'live' : 'sched';
    const liveDot = isLive ? '<span class="live-dot"></span>' : '';
    const scoreDisplay = m.scoreH !== null
      ? `<div class="score">${m.scoreH}–${m.scoreA}</div>`
      : `<div class="score" style="font-size:18px;color:var(--muted)">vs</div>`;
    const delay = i * 0.06;

    html += `
    <div class="match-card ${isLive ? 'live' : ''}" style="animation-delay:${delay}s">
      <div class="team home">
        <div class="team-crest">${crest(m.home)}</div>
        <div class="team-name">${shortName(m.home)}</div>
      </div>
      <div class="score-block">
        ${scoreDisplay}
        <div class="match-status ${statusClass}">${liveDot}${m.status}</div>
      </div>
      <div class="team away">
        <div class="team-crest">${crest(m.away)}</div>
        <div class="team-name">${shortName(m.away)}</div>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

loadScores();
// Auto-refresh every 3 minutes
setInterval(loadScores, 3 * 60 * 1000);

/* ═══════════════════════════════════════
   CALENDAR
═══════════════════════════════════════ */
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DOWS   = ['Su','Mo','Tu','We','Th','Fr','Sa'];

let calYear, calMonth, selectedDate;
const today = new Date();

function initCal() {
  calYear  = today.getFullYear();
  calMonth = today.getMonth();
  selectedDate = today.toISOString().split('T')[0];
  renderCal();
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCal();
}

function getEvents() {
  try { return JSON.parse(localStorage.getItem('dash_events') || '[]'); } catch(e) { return []; }
}

function saveEvents(evts) {
  localStorage.setItem('dash_events', JSON.stringify(evts));
}

function renderCal() {
  document.getElementById('cal-month-label').textContent = MONTHS[calMonth] + ' ' + calYear;

  const first = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const daysInPrev  = new Date(calYear, calMonth, 0).getDate();
  const events = getEvents();
  const eventDates = new Set(events.map(e => e.date));

  let html = DOWS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // Prev month fill
  for (let i = first - 1; i >= 0; i--) {
    html += `<div class="cal-day other-month">${daysInPrev - i}</div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const isToday    = dateStr === today.toISOString().split('T')[0];
    const isSelected = dateStr === selectedDate;
    const hasEvent   = eventDates.has(dateStr);
    const cls = [isToday ? 'today' : '', hasEvent ? 'has-event' : ''].filter(Boolean).join(' ');
    html += `<div class="cal-day ${cls}" onclick="selectDate('${dateStr}')">${d}</div>`;
  }

  // Next month fill
  const total = first + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="cal-day other-month">${d}</div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
  renderEvents(selectedDate);
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCal();
}

function renderEvents(dateStr) {
  const events = getEvents().filter(e => e.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));
  const d = new Date(dateStr + 'T12:00:00');
  const label = d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'short' });
  document.getElementById('events-label').textContent = label;

  const list = document.getElementById('events-list');
  if (!events.length) {
    list.innerHTML = `<div class="no-matches">No events</div>`;
    return;
  }

  list.innerHTML = events.map((e, i) => `
    <div class="event-item" style="animation-delay:${i*0.05}s" onclick="deleteEvent(${e.id})">
      <div class="event-time">${e.time || '—'}</div>
      <div>
        <div class="event-name">${e.name}</div>
        ${e.sub ? `<div class="event-sub">${e.sub}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function deleteEvent(id) {
  if (!confirm('Remove this event?')) return;
  const evts = getEvents().filter(e => e.id !== id);
  saveEvents(evts);
  renderCal();
}

/* ═══════════════════════════════════════
   ADD EVENT MODAL
═══════════════════════════════════════ */
function openModal() {
  document.getElementById('event-date-input').value = selectedDate;
  document.getElementById('event-name-input').value = '';
  document.getElementById('event-time-input').value = '';
  document.getElementById('event-sub-input').value  = '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveEvent() {
  const name = document.getElementById('event-name-input').value.trim();
  const date = document.getElementById('event-date-input').value;
  const time = document.getElementById('event-time-input').value;
  const sub  = document.getElementById('event-sub-input').value.trim();
  if (!name || !date) return;

  const events = getEvents();
  events.push({ id: Date.now(), name, date, time, sub });
  saveEvents(events);
  closeModal();
  selectedDate = date;
  renderCal();
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

initCal();
</script>
